# This is a Databricks asset bundle definition for bakehouse_analytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehouse_analytics
  uuid: 49b13f4c-980e-44e7-a2a7-bf62f92715ec

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    # mode: development
    presets:
      name_prefix: dev_
    default: true
    workspace:
      host: https://adb-7405611993854862.2.azuredatabricks.net
    variables:
      catalog: democatalog
      schema: rnd
  prod:
    mode: production
    presets:
      name_prefix: prod_
    workspace:
      host: https://adb-7405611993854862.2.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/sadhuc32@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sadhuc32@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prodcatalog
      schema: rnd
    permissions:
      - user_name: sadhuc32@gmail.com
        level: CAN_MANAGE
